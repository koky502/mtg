<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard Autónomo - MTG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #scoreboard-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            height: 55px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border-radius: 4px;
            overflow: hidden;
        }

        .team-box {
            background: rgba(15, 15, 15, 0.95);
            color: #ffffff;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 25px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 180px;
        }

        .team-left { 
            justify-content: flex-end; 
            border-bottom: 3px solid #b8860b;
        }
        
        .team-right { 
            justify-content: flex-start; 
            border-bottom: 3px solid #b8860b;
        }

        .time-box {
            background: linear-gradient(135deg, #111111 0%, #222222 100%);
            color: #e6ca65;
            height: 100%;
            width: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 1px;
            z-index: 5;
            border-bottom: 3px solid #e6ca65;
            clip-path: polygon(0% 0%, 100% 0%, 85% 100%, 15% 100%);
            padding: 0 10px;
            cursor: pointer; /* Indica que se puede clickear en OBS */
        }

        .score-box {
            background: linear-gradient(135deg, #b8860b 0%, #e6ca65 50%, #996515 100%);
            color: #000000;
            height: 100%;
            width: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 900;
            z-index: 4;
        }

        .score-left {
            clip-path: polygon(0% 0%, 100% 0%, 80% 100%, 0% 100%);
            padding-right: 8px;
        }

        .score-right {
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 20% 100%);
            padding-left: 8px;
        }
    </style>
</head>
<body>

    <div id="scoreboard-container" onclick="toggleReloj()">
        <div id="team1-name" class="team-box team-left">LOCAL</div>
        <div id="team1-score" class="score-box score-left">0</div>

        <div id="game-clock" class="time-box">00:00</div>

        <div id="team2-score" class="score-box score-right">0</div>
        <div id="team2-name" class="team-box team-right">VISITANTE</div>
    </div>

   <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTtxIX6cZO_YWTxd2X0ElxK59rl1lCE7bjLzlO21aBzoXZFrMC2Vd3Yin8AolkYFKK0zKPRhA7dF0Rn/pub?output=csv";

        // CRONÓMETRO PURO LOCAL
        let segundosCronometro = 0;
        let ejecutando = true; 

        // ESCUDO ANTI-RETROCESO (Guarda los goles reales en la memoria del script)
        let golesLocalConfirmados = 0;
        let golesVisitaConfirmados = 0;
        let rachaErroresGoogle = 0;

        function limpiarTexto(txt) {
            if (!txt) return "";
            return txt.replace(/^"|"\$/g, '').trim();
        }

        function toggleReloj() {
            ejecutando = !ejecutando;
            const relojElemento = document.getElementById("game-clock");
            if (!ejecutando) {
                relojElemento.style.color = "#ff4444"; 
            } else {
                relojElemento.style.color = "#e6ca65"; 
            }
        }

        // MOTOR DEL TIEMPO (100% local, inmune a internet)
        setInterval(() => {
            if (ejecutando) {
                segundosCronometro++;
                const mins = Math.floor(segundosCronometro / 60);
                const segs = segundosCronometro % 60;
                const strMins = mins < 10 ? "0" + mins : mins;
                const strSegs = segs < 10 ? "0" + segs : segs;
                document.getElementById("game-clock").innerText = `${strMins}:${strSegs}`;
            }
        }, 1000);

        // RECEPTOR DE GOLES INTELIGENTE
        async function consultarGolesYEquipos() {
            try {
                // Forzamos la ruptura de caché del navegador usando la hora exacta en milisegundos
                const response = await fetch(`${csvUrl}&nocache=${new Date().getTime()}`);
                const dataText = await response.text();
                const lines = dataText.replace(/\r/g, "").split("\n");

                if (lines.length < 9) return;

                const filaEq1 = lines[7].split(","); 
                const filaEq2 = lines[8].split(","); 

                const nombreLocal = limpiarTexto(filaEq1[0]);
                const golesLocalNube = parseInt(limpiarTexto(filaEq1[1])) || 0;

                const nombreVisita = limpiarTexto(filaEq2[0]);
                const golesVisitaNube = parseInt(limpiarTexto(filaEq2[1])) || 0;

                // Actualizar nombres (estos no sufren por fluctuaciones de números)
                document.getElementById("team1-name").innerText = nombreLocal;
                document.getElementById("team2-name").innerText = nombreVisita;

                // VALIDACIÓN DE SEGURIDAD (MÉTODO HISTÓRICO)
                // Si la nube me envía un número menor al que yo ya canté en pantalla, 
                // lo ignoro porque es un retraso de sincronización de los servidores de Google.
                if (golesLocalNube >= golesLocalConfirmados) {
                    golesLocalConfirmados = golesLocalNube;
                    document.getElementById("team1-score").innerText = golesLocalConfirmados;
                }
                
                if (golesVisitaNube >= golesVisitaConfirmados) {
                    golesVisitaConfirmados = golesVisitaNube;
                    document.getElementById("team2-score").innerText = golesVisitaConfirmados;
                }

            } catch (error) {
                console.error("Error actualizando datos:", error);
            }
        }

        // Consultamos cada 3 segundos para acelerar el tiempo de respuesta
        setInterval(consultarGolesYEquipos, 3000);
        consultarGolesYEquipos();
    </script>
</body>
</html>
