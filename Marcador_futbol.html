<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard Profesional Estable - MTG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #scoreboard-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            height: 55px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border-radius: 4px;
            overflow: hidden;
        }

        .team-box {
            background: rgba(15, 15, 15, 0.95);
            color: #ffffff;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 25px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 180px;
        }

        .team-left { 
            justify-content: flex-end; 
            border-bottom: 3px solid #b8860b;
        }
        
        .team-right { 
            justify-content: flex-start; 
            border-bottom: 3px solid #b8860b;
        }

        .time-box {
            background: linear-gradient(135deg, #111111 0%, #222222 100%);
            color: #e6ca65;
            height: 100%;
            width: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 1px;
            z-index: 5;
            border-bottom: 3px solid #e6ca65;
            clip-path: polygon(0% 0%, 100% 0%, 85% 100%, 15% 100%);
            padding: 0 10px;
        }

        .score-box {
            background: linear-gradient(135deg, #b8860b 0%, #e6ca65 50%, #996515 100%);
            color: #000000;
            height: 100%;
            width: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 900;
            z-index: 4;
        }

        .score-left {
            clip-path: polygon(0% 0%, 100% 0%, 80% 100%, 0% 100%);
            padding-right: 8px;
        }

        .score-right {
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 20% 100%);
            padding-left: 8px;
        }
    </style>
</head>
<body>

    <div id="scoreboard-container">
        <div id="team1-name" class="team-box team-left">LOCAL</div>
        <div id="team1-score" class="score-box score-left">0</div>

        <div id="game-clock" class="time-box">00:00</div>

        <div id="team2-score" class="score-box score-right">0</div>
        <div id="team2-name" class="team-box team-right">VISITANTE</div>
    </div>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTtxIX6cZO_YWTxd2X0ElxK59rl1lCE7bjLzlO21aBzoXZFrMC2Vd3Yin8AolkYFKK0zKPRhA7dF0Rn/pub?output=csv";

        let segundosActuales = 0;
        let relojCorriendo = false;
        let intervaloReloj;
        let ultimaHoraSheets = ""; // Almacena el valor string exacto de la nube

        function limpiarTexto(txt) {
            if (!txt) return "";
            return txt.replace(/^"|"\$/g, '').replace(/:$/, '').trim();
        }

        async function procesarMarcador() {
            try {
                const response = await fetch(`${csvUrl}&nocache=${new Date().getTime()}`);
                const dataText = await response.text();
                const lines = dataText.replace(/\r/g, "").split("\n");

                if (lines.length < 10) return;

                const filaEq1 = lines[7].split(","); // Fila 8
                const filaEq2 = lines[8].split(","); // Fila 9
                const filaHora = lines[9].split(","); // Fila 10

                // Actualizar nombres y goles (cambian instantáneamente si se editan en Excel)
                document.getElementById("team1-name").innerText = limpiarTexto(filaEq1[0]);
                document.getElementById("team1-score").innerText = limpiarTexto(filaEq1[1]) || "0";

                document.getElementById("team2-name").innerText = limpiarTexto(filaEq2[0]);
                document.getElementById("team2-score").innerText = limpiarTexto(filaEq2[1]) || "0";

                const comandoHora = limpiarTexto(filaHora[1]); // Celda B10

                // FILTRO INTELIGENTE: Solo operamos si el usuario REALMENTE modificó la celda en Excel
                if (comandoHora !== ultimaHoraSheets) {
                    ultimaHoraSheets = comandoHora;
                    
                    if (comandoHora.toLowerCase() === "pausa") {
                        relojCorriendo = false;
                        clearInterval(intervaloReloj);
                    } else {
                        // Desglosamos la hora ingresada
                        const partes = comandoHora.split(":");
                        const mins = parseInt(partes[0]) || 0;
                        const segs = parseInt(partes[1]) || 0;
                        
                        // Seteamos los segundos base en el acumulador global
                        segundosActuales = (mins * 60) + segs;
                        
                        // Si el reloj no estaba corriendo, lo encendemos de forma persistente
                        if (!relojCorriendo) {
                            relojCorriendo = true;
                            clearInterval(intervaloReloj);
                            intervaloReloj = setInterval(actualizarSegundoReloj, 1000);
                        }
                    }
                }

            } catch (error) {
                console.error("Error sincronizando el marcador:", error);
            }
        }

        function actualizarSegundoReloj() {
            if (!relojCorriendo) return;
            
            segundosActuales++;
            
            const mins = Math.floor(segundosActuales / 60);
            const segs = segundosActuales % 60;
            
            const strMins = mins < 10 ? "0" + mins : mins;
            const strSegs = segs < 10 ? "0" + segs : segs;
            
            // Actualiza visualmente el DOM en tiempo real segundo a segundo
            document.getElementById("game-clock").innerText = `${strMins}:${strSegs}`;
        }

        // El bucle de consulta web corre cada 4 segundos, pero ya no reseteará el reloj gracias al filtro inteligente
        setInterval(procesarMarcador, 4000); 
        procesarMarcador();
    </script>
</body>
</html>
