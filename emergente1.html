<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patrocinadores Premium - MTG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #sponsors-container {
            position: absolute;
            bottom: 20px; /* Lo sitúa elegantemente en la parte inferior de la pantalla */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border-radius: 4px;
            overflow: hidden;
        }

        /* TÍTULO O NOMBRE DEL EVENTO */
        .event-box {
            background: rgba(0, 0, 0, 0.85);
            color: #ffffff;
            padding: 6px 25px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        /* CAJA PRINCIPAL: Fondo negro transparente e hilo color oro abajo */
        .sponsor-box {
            background: rgba(0, 0, 0, 0.75);
            color: #e6ca65; /* Letras color Oro */
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center; 
            text-align: center;      
            padding: 0 40px;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 350px;
            box-sizing: border-box;
            border-bottom: 3px solid #b8860b; /* Línea inferior Oro Mate */
            transition: all 0.5s ease-in-out;
        }
    </style>
</head>
<body>

    <div id="sponsors-container">
        <div id="event-title" class="event-box">TRANSMISIÓN EN VIVO</div>
        <div id="sponsor-name" class="sponsor-box">CARGANDO...</div>
    </div>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTtxIX6cZO_YWTxd2X0ElxK59rl1lCE7bjLzlO21aBzoXZFrMC2Vd3Yin8AolkYFKK0zKPRhA7dF0Rn/pub?output=csv";

        function limpiar(t) { 
            return t ? t.replace(/^"|"\$/g, '').trim() : ""; 
        }

        async function consultarPatrocinadores() {
            try {
                const r = await fetch(`${csvUrl}&nocache=${new Date().getTime()}`);
                const d = await r.text(); 
                const l = d.replace(/\r/g, "").split("\n");
                
                if (l.length < 4) return;
                
                // Leemos las celdas de tu encabezado de Excel
                const filaTitulo = l[1].split(","); // Fila 2: "Nombre del evento"
                const filaSponsor = l[2].split(","); // Fila 3: Nombre del patrocinador/homenajeado

                const eventoNombre = limpiar(filaTitulo[1]) || "TRANSMISIÓN EN VIVO"; // Celda B2
                const sponsorNombre = limpiar(filaSponsor[1]) || "MTG PRODUCCIONES";  // Celda B3

                // Inyectamos con la nueva estética centrada y limpia
                document.getElementById("event-title").innerText = eventoNombre;
                document.getElementById("sponsor-name").innerText = sponsorNombre;

            } catch (e) { 
                console.error("Error leyendo patrocinadores:", e); 
            }
        }

        // Revisa tu Excel cada 5 segundos para ver si cambiaste de marca o evento
        setInterval(consultarPatrocinadores, 5000); 
        consultarPatrocinadores();
    </script>
</body>
</html>
