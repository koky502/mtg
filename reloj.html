<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MTG - Diseño Simétrico Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            --gold-light: #FFD35B;
            --gold-main: #C99725;
            --gold-dark: #8C6211;
            --black-overlay: rgba(18, 18, 18, 0.95);
        }

        /* Contenedor optimizado arriba a la derecha */
        .mtg-badge-box {
            position: absolute;
            top: 40px;      
            right: 40px;    
            
            background-color: var(--black-overlay);
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.9)),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="49" viewBox="0 0 28 49"><g fill-rule="evenodd"><g id="hexagons" fill="%23222" fill-opacity="0.3" fill-rule="nonzero"><path d="M13.99 9.25l13 7.5v15l-13 7.5L1 31.75v-15l12.99-7.5zM3 17.25v13.5l11 6.35 11-6.35V17.25L14 10.9 3 17.25zM0 45h28v3H0v-3zm0-45h28v3H0V0z"/></g></g></svg>');
            background-repeat: repeat;
            
            border: 2px solid var(--gold-main);
            border-radius: 8px;
            padding: 14px 24px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.7);
            min-width: 190px;
        }

        /* Título Principal MTG EN VIVO */
        .badge-titulo {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            margin: 0 0 8px 0;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: linear-gradient(180deg, var(--gold-light), var(--gold-main));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 1px solid rgba(201, 151, 37, 0.3);
            padding-bottom: 6px;
        }

        /* Formato idéntico y simétrico para Fecha y Hora */
        .tiempo-datos {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 2px;
            margin: 4px 0;
            text-shadow: 0 0 8px rgba(201, 151, 37, 0.5);
        }
    </style>
</head>
<body>

    <div class="mtg-badge-box">
        <div class="badge-titulo">MTG EN VIVO</div>
        <div id="fecha" class="tiempo-datos">00/00/0000</div>
        <div id="reloj" class="tiempo-datos">00:00:00</div>
    </div>

    <script>
        function actualizarPantalla() {
            const ahora = new Date();
            
            // --- CÓDIGO DE LA FECHA (DD/MM/AAAA) ---
            let dia = ahora.getDate();
            let mes = ahora.getMonth() + 1; 
            const anio = ahora.getFullYear();

            dia = dia < 10 ? '0' + dia : dia;
            mes = mes < 10 ? '0' + mes : mes;

            document.getElementById('fecha').textContent = `${dia}/${mes}/${anio}`;

            // --- CÓDIGO DEL RELOJ ---
            let horas = ahora.getHours();
            let minutes = ahora.getMinutes();
            let segundos = ahora.getSeconds();

            horas = horas < 10 ? '0' + horas : horas;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            segundos = segundos < 10 ? '0' + segundos : segundos;

            document.getElementById('reloj').textContent = `${horas}:${minutes}:${segundos}`;
        }
        
        actualizarPantalla();
        setInterval(actualizarPantalla, 1000);
    </script>

</body>
</html>
