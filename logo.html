<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MTG - Marketing Master Overlay 3D Pro (AIDA 12s Proporcional)</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght=900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            perspective: 1600px;
            --gold-light: #FFF5BC;
            --gold-bright: #FFD35B;
            --gold-main: #C99725;
            --gold-dark: #8C6211;
            --gold-deep: #3A2803;
        }

        /* CONTENEDOR PRINCIPAL: Zoom de escena estirado proporcionalmente */
        .stage-3d {
            position: relative;
            width: 700px;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            filter: drop-shadow(0px 8px 16px rgba(0,0,0,0.65));
            
            opacity: 0;
            transform: scale(0.8) translateZ(-200px);
            transition: opacity 0.4s ease;
        }

        .stage-3d.activo {
            opacity: 1;
            animation: stagePulseAIDA 12s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes stagePulseAIDA {
            0% { transform: scale(0.8) translateZ(-200px); }
            8% { transform: scale(1) translateZ(0px); }
            25%, 35% { transform: scale(1.04) translateZ(30px); } /* El zoom se mantiene vivo entre el seg 3 y 4 */
            42%, 92% { transform: scale(1) translateZ(0px); }
            100% { transform: scale(0.8) translateZ(-200px); opacity: 0; }
        }

        /* ==========================================
           1. ARCOS WI-FI (SE ATENUAN Y GUARDAN POSICIÓN)
           ========================================== */
        .wifi-3d-group {
            position: relative;
            width: 240px;
            height: 65px;
            margin-bottom: -23px; 
            transform-style: preserve-3d;
            z-index: 10;
        }

        .arc-3d {
            position: absolute;
            bottom: 0;
            left: 50%;
            border: 14px solid transparent;
            border-top: 14px solid var(--gold-bright);
            border-radius: 50%;
            transform-style: preserve-3d;
            transform-origin: bottom center;
            opacity: 0;
        }

        .arc-1 { width: 60px; height: 60px; margin-left: -44px; }
        .arc-2 { width: 120px; height: 120px; margin-left: -74px; }
        .arc-3 { width: 180px; height: 180px; margin-left: -104px; }

        .activo .arc-1 { animation: loopArc1 12s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .activo .arc-2 { animation: loopArc2 12s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .activo .arc-3 { animation: loopArc3 12s cubic-bezier(0.25, 1, 0.5, 1) forwards; }

        @keyframes loopArc1 {
            0% { opacity: 0; transform: translateZ(300px) scale(0.4); filter: brightness(2.5) drop-shadow(0 0 15px var(--gold-bright)); }
            6% { opacity: 1; transform: translateZ(0) scale(1); filter: brightness(1.8) drop-shadow(0 0 12px var(--gold-bright)); }
            20%, 92% { opacity: 1; transform: translateZ(0) scale(1); filter: brightness(0.6) drop-shadow(0px 4px 8px rgba(0,0,0,0.7)); }
            100% { opacity: 0; transform: translateZ(100px) scale(0.8); }
        }
        @keyframes loopArc2 {
            0%, 2% { opacity: 0; transform: translateZ(400px) scale(0.4); filter: brightness(2.5) drop-shadow(0 0 15px var(--gold-bright)); }
            8% { opacity: 1; transform: translateZ(0) scale(1); filter: brightness(1.8) drop-shadow(0 0 12px var(--gold-bright)); }
            22%, 92% { opacity: 1; transform: translateZ(0) scale(1); filter: brightness(0.6) drop-shadow(0px 4px 8px rgba(0,0,0,0.7)); }
            100% { opacity: 0; transform: translateZ(150px) scale(0.8); }
        }
        @keyframes loopArc3 {
            0%, 4% { opacity: 0; transform: translateZ(500px) scale(0.4); filter: brightness(2.5) drop-shadow(0 0 15px var(--gold-bright)); }
            10% { opacity: 1; transform: translateZ(0) scale(1); filter: brightness(1.8) drop-shadow(0 0 12px var(--gold-bright)); }
            24% { filter: brightness(0.6) drop-shadow(0px 4px 8px rgba(0,0,0,0.7)); }
            30% { filter: brightness(0.6) drop-shadow(0 0 20px var(--gold-bright)); }
            35%, 92% { opacity: 1; transform: translateZ(0) scale(1); filter: brightness(0.6) drop-shadow(0px 4px 8px rgba(0,0,0,0.7)); }
            100% { opacity: 0; transform: translateZ(200px) scale(0.8); }
        }

        /* ==========================================
           2. NÚCLEO: LETRAS MTG (BRILLO EXTENDIDO)
           ========================================== */
        .logo-core-3d {
            display: flex;
            transform-style: preserve-3d;
            font-family: 'Orbitron', sans-serif;
            font-size: 140px;
            font-weight: 900;
            letter-spacing: -2px;
            position: relative;
            color: var(--gold-bright);
            line-height: 110px;
        }

        .letter-3d {
            display: inline-block;
            position: relative;
            transform-style: preserve-3d;
            opacity: 0;
            background: linear-gradient(135deg, 
                var(--gold-light) 0%, 
                var(--gold-bright) 28%, 
                var(--gold-dark) 55%, 
                var(--gold-light) 78%, 
                var(--gold-main) 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .letter-3d::after {
            content: attr(data-letter);
            position: absolute;
            top: 0;
            left: 0;
            transform: translateZ(-14px);
            background: linear-gradient(180deg, var(--gold-main) 0%, var(--gold-deep) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: -1;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.8));
        }

        .activo .m-piece { animation: loopM3D 12s cubic-bezier(0.25, 1, 0.5, 1) forwards; animation-delay: 0.1s; }
        .activo .t-piece { animation: loopT3D 12s cubic-bezier(0.25, 1, 0.5, 1) forwards; animation-delay: 0.2s; }
        .activo .g-piece { animation: loopG3D 12s cubic-bezier(0.25, 1, 0.5, 1) forwards; animation-delay: 0.3s; }

        @keyframes loopM3D {
            0% { opacity: 0; transform: translateX(-80px) translateZ(200px) rotateY(-40deg); filter: brightness(1); }
            8% { opacity: 1; transform: translateX(0) translateZ(0) rotateY(0deg); filter: brightness(0.9); }
            25% { filter: brightness(1.8) drop-shadow(0 0 25px rgba(255, 211, 91, 0.8)); } /* Impulso AIDA en segundo 3 */
            35%, 92% { opacity: 1; transform: translateX(0) translateZ(0) rotateY(0deg); filter: brightness(1.1) drop-shadow(0 0 8px rgba(255, 211, 91, 0.3)); } /* Sostiene el brillo */
            100% { opacity: 0; transform: translateZ(150px); }
        }

        @keyframes loopT3D {
            0% { opacity: 0; transform: translateY(-50px) translateZ(200px) rotateX(40deg); filter: brightness(1); }
            8% { opacity: 1; transform: translateY(0) translateZ(0) rotateX(0deg); filter: brightness(0.9); }
            28% { filter: brightness(1.8) drop-shadow(0 0 25px rgba(255, 211, 91, 0.8)); }
            38%, 92% { opacity: 1; transform: translateY(0) translateZ(0) rotateX(0deg); filter: brightness(1.1) drop-shadow(0 0 8px rgba(255, 211, 91, 0.3)); }
            100% { opacity: 0; transform: translateZ(150px); }
        }

        @keyframes loopG3D {
            0% { opacity: 0; transform: translateX(80px) translateZ(200px) rotateY(40deg); filter: brightness(1); }
            8% { opacity: 1; transform: translateX(0) translateZ(0) rotateY(0deg); filter: brightness(0.9); }
            31% { filter: brightness(1.8) drop-shadow(0 0 25px rgba(255, 211, 91, 0.8)); }
            40%, 92% { opacity: 1; transform: translateX(0) translateZ(0) rotateY(0deg); filter: brightness(1.1) drop-shadow(0 0 8px rgba(255, 211, 91, 0.3)); }
            100% { opacity: 0; transform: translateZ(150px); }
        }

        /* ==========================================
           3. PANEL DE MARKETING CON PERSISTENCIA
           ========================================== */
        .info-panel-3d {
            position: relative;
            min-width: 320px; 
            padding: 0 25px; 
            height: 46px;
            margin-top: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 23px;
            font-weight: 900;
            letter-spacing: 3px;
            opacity: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(12, 12, 12, 0.78);
            border-radius: 6px;
            border: 1.5px solid rgba(255, 211, 91, 0.25);
            box-shadow: inset 0 0 8px rgba(255, 211, 91, 0.15), 0 5px 12px rgba(0,0,0,0.5);
            transform: translateZ(-30px) scale(0.9);
        }

        .activo .info-panel-3d {
            animation: loopPanel 12s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes loopPanel {
            0% { opacity: 0; transform: translateY(20px) translateZ(-30px) scale(0.9); }
            10%, 92% { opacity: 1; transform: translateY(0) translateZ(0) scale(1); }
            100% { opacity: 0; transform: translateY(10px) translateZ(50px); }
        }

        .marketing-text-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .text-slide {
            position: absolute;
            white-space: nowrap;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold-bright) 50%, var(--gold-main) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 3px rgba(0, 0, 0, 0.9));
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .text-slide.activo-slide { opacity: 1; transform: translateY(0); }
        .text-slide.pasado-slide { opacity: 0; transform: translateY(-10px); }

        /* ==========================================
           4. DESTELLO MÁGICO "GLINT" AJUSTADO
           ========================================== */
        .stage-3d::after {
            content: '';
            position: absolute;
            top: 15%;
            left: -150%;
            width: 120px;
            height: 60%;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 255, 255, 0.8) 50%, 
                rgba(255, 211, 91, 0.4) 75%, 
                transparent 100%
            );
            transform: skewX(-35deg) translateZ(20px);
        }

        .activo::after {
            animation: loopFlash 12s ease-in-out forwards;
        }

        @keyframes loopFlash {
            0%, 20% { left: -150%; opacity: 0; }
            32% { left: 150%; opacity: 1; } /* El destello cruza justo en el climax del brillo (segundo 3.8) */
            40%, 100% { left: 150%; opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="mtg-stage" class="stage-3d">
        
        <div class="wifi-3d-group">
            <div class="arc-3d arc-1"></div>
            <div class="arc-3d arc-2"></div>
            <div class="arc-3d arc-3"></div>
        </div>

        <div class="logo-core-3d">
            <span class="letter-3d m-piece" data-letter="M">M</span>
            <span class="letter-3d t-piece" data-letter="T">T</span>
            <span class="letter-3d g-piece" data-letter="G">G</span>
        </div>

        <div class="info-panel-3d">
            <div class="marketing-text-wrapper">
                <span id="slide-1" class="text-slide">TEL. 3684 7307</span>
                <span id="slide-2" class="text-slide">¡RESERVA YA!</span>
            </div>
        </div>
        
    </div>

    <script>
        const DURACION_VISIBLE = 12000; // 12 segundos expuesto
        const PAUSA_OCULTO     = 180000; // 3 minutos oculto (180 segundos)

        const stage = document.getElementById("mtg-stage");
        const slide1 = document.getElementById("slide-1");
        const slide2 = document.getElementById("slide-2");

        function ejecutarBucleLogo() {
            stage.className = "stage-3d activo";
            
            // Primer texto entra al segundo 1
            setTimeout(() => {
                slide1.className = "text-slide activo-slide";
                slide2.className = "text-slide";
            }, 1000);

            // Segundo texto cambia al segundo 6 (Justo a la mitad de los 12 segundos)
            setTimeout(() => {
                slide1.className = "text-slide pasado-slide";
                slide2.className = "text-slide activo-slide";
            }, 6000);

            // Desaparición total al segundo 12 exacto
            setTimeout(() => {
                stage.className = "stage-3d"; 
                
                setTimeout(() => {
                    slide1.className = "text-slide";
                    slide2.className = "text-slide";
                }, 800);
            }, DURACION_VISIBLE);
        }

        function iniciarControlador() {
            ejecutarBucleLogo();
            setInterval(ejecutarBucleLogo, DURACION_VISIBLE + PAUSA_OCULTO);
        }

        window.onload = iniciarControlador;
    </script>
</body>
</html>
