<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MTG - Marketing Master Overlay 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght=900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            perspective: 1600px;
            --gold-light: #FFF5BC;
            --gold-bright: #FFD35B;
            --gold-main: #C99725;
            --gold-dark: #8C6211;
            --gold-deep: #3A2803;
        }

        .stage-3d {
            position: relative;
            width: 700px;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            filter: drop-shadow(0px 8px 16px rgba(0,0,0,0.65));
            animation: stagePulse 180s cubic-bezier(0.25, 1, 0.5, 1) infinite;
        }

        @keyframes stagePulse {
            0%, 1.2% { transform: scale(1); }
            1.5% { transform: scale(1.03); }
            1.8%, 100% { transform: scale(1); }
        }

        /* ==========================================
           1. ARCOS WI-FI (EFECTO RADAR/SEÑAL VIVA)
           ========================================== */
        .wifi-3d-group {
            position: relative;
            width: 240px;
            height: 65px;
            margin-bottom: -23px; 
            transform-style: preserve-3d;
            z-index: 10;
        }

        .arc-3d {
            position: absolute;
            bottom: 0;
            left: 50%;
            border: 14px solid transparent;
            border-top: 14px solid var(--gold-bright);
            border-radius: 50%;
            transform-style: preserve-3d;
            transform-origin: bottom center;
            opacity: 0;
        }

        .arc-1 { width: 60px; height: 60px; margin-left: -44px; animation: loopArc1 180s cubic-bezier(0.25, 1, 0.5, 1) infinite; }
        .arc-2 { width: 120px; height: 120px; margin-left: -74px; animation: loopArc2 180s cubic-bezier(0.25, 1, 0.5, 1) infinite; }
        .arc-3 { width: 180px; height: 180px; margin-left: -104px; animation: loopArc3 180s cubic-bezier(0.25, 1, 0.5, 1) infinite; }

        @keyframes loopArc1 {
            0% { opacity: 0; transform: translateZ(300px) scale(0.4); filter: brightness(2.5) drop-shadow(0 0 15px var(--gold-bright)); }
            0.3% { opacity: 1; transform: translateZ(0) scale(1); filter: brightness(1.8) drop-shadow(0 0 12px var(--gold-bright)); }
            1.3% { filter: brightness(0.6) drop-shadow(0px 4px 8px rgba(0,0,0,0.7)); }
            5.5% { opacity: 1; transform: translateZ(0) scale(1); }
            5.7%, 100% { opacity: 0; transform: translateZ(100px) scale(0.8); filter: blur(4px); }
        }
        @keyframes loopArc2 {
            0%, 0.1% { opacity: 0; transform: translateZ(400px) scale(0.4); filter: brightness(2.5) drop-shadow(0 0 15px var(--gold-bright)); }
            0.4% { opacity: 1; transform: translateZ(0) scale(1); filter: brightness(1.8) drop-shadow(0 0 12px var(--gold-bright)); }
            1.4% { filter: brightness(0.6) drop-shadow(0px 4px 8px rgba(0,0,0,0.7)); }
            5.5% { opacity: 1; transform: translateZ(0) scale(1); }
            5.7%, 100% { opacity: 0; transform: translateZ(150px) scale(0.8); filter: blur(4px); }
        }
        @keyframes loopArc3 {
            0%, 0.2% { opacity: 0; transform: translateZ(500px) scale(0.4); filter: brightness(2.5) drop-shadow(0 0 15px var(--gold-bright)); }
            0.5% { opacity: 1; transform: translateZ(0) scale(1); filter: brightness(1.8) drop-shadow(0 0 12px var(--gold-bright)); }
            1.6% { filter: brightness(0.6) drop-shadow(0px 4px 8px rgba(0,0,0,0.7)); }
            2.3% { filter: brightness(0.6) drop-shadow(0 0 20px var(--gold-bright)); }
            2.6% { filter: brightness(0.6) drop-shadow(0px 4px 8px rgba(0,0,0,0.7)); }
            5.5% { opacity: 1; transform: translateZ(0) scale(1); }
            5.7%, 100% { opacity: 0; transform: translateZ(200px) scale(0.8); filter: blur(4px); }
        }

        /* ==========================================
           2. NÚCLEO: LETRAS MTG
           ========================================== */
        .logo-core-3d {
            display: flex;
            transform-style: preserve-3d;
            font-family: 'Orbitron', sans-serif;
            font-size: 140px;
            font-weight: 900;
            letter-spacing: -2px;
            position: relative;
            color: var(--gold-bright);
            line-height: 110px;
        }

        .letter-3d {
            display: inline-block;
            position: relative;
            transform-style: preserve-3d;
            opacity: 0;
            background: linear-gradient(135deg, 
                var(--gold-light) 0%, 
                var(--gold-bright) 28%, 
                var(--gold-dark) 55%, 
                var(--gold-light) 78%, 
                var(--gold-main) 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .letter-3d::after {
            content: attr(data-letter);
            position: absolute;
            top: 0;
            left: 0;
            transform: translateZ(-14px);
            background: linear-gradient(180deg, var(--gold-main) 0%, var(--gold-deep) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: -1;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.8));
        }

        .m-piece { animation: loopM3D 180s cubic-bezier(0.25, 1, 0.5, 1) infinite; animation-delay: 0.2s; }
        .t-piece { animation: loopT3D 180s cubic-bezier(0.25, 1, 0.5, 1) infinite; animation-delay: 0.4s; }
        .g-piece { animation: loopG3D 180s cubic-bezier(0.25, 1, 0.5, 1) infinite; animation-delay: 0.6s; }

        @keyframes loopM3D {
            0% { opacity: 0; transform: translateX(-80px) translateZ(200px) rotateY(-40deg); filter: brightness(1); }
            0.6% { opacity: 1; transform: translateX(0) translateZ(0) rotateY(0deg); filter: brightness(0.9); }
            1.4% { filter: brightness(1.8) drop-shadow(0 0 25px rgba(255, 211, 91, 0.8)); }
            4.6% { filter: brightness(0.95); }
            5.5% { opacity: 1; transform: translateX(0) translateZ(0) rotateY(0deg); }
            5.7%, 100% { opacity: 0; transform: translateZ(150px); filter: blur(2px); }
        }

        @keyframes loopT3D {
            0% { opacity: 0; transform: translateY(-50px) translateZ(200px) rotateX(40deg); filter: brightness(1); }
            0.6% { opacity: 1; transform: translateY(0) translateZ(0) rotateX(0deg); filter: brightness(0.9); }
            1.6% { filter: brightness(1.8) drop-shadow(0 0 25px rgba(255, 211, 91, 0.8)); }
            4.6% { filter: brightness(0.95); }
            5.5% { opacity: 1; transform: translateY(0) translateZ(0) rotateX(0deg); }
            5.7%, 100% { opacity: 0; transform: translateZ(150px); filter: blur(2px); }
        }

        @keyframes loopG3D {
            0% { opacity: 0; transform: translateX(80px) translateZ(200px) rotateY(40deg); filter: brightness(1); }
            0.6% { opacity: 1; transform: translateX(0) translateZ(0) rotateY(0deg); filter: brightness(0.9); }
            1.7% { filter: brightness(1.8) drop-shadow(0 0 25px rgba(255, 211, 91, 0.8)); }
            4.6% { filter: brightness(0.95); }
            5.5% { opacity: 1; transform: translateX(0) translateZ(0) rotateY(0deg); }
            5.7%, 100% { opacity: 0; transform: translateZ(150px); filter: blur(2px); }
        }

        /* ==========================================
           3. PANEL DE MARKETING INTERMITENTE
           ========================================== */
        .info-panel-3d {
            position: relative;
            width: 310px; 
            height: 45px;
            margin-top: 5px;
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 3px;
            opacity: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(12, 12, 12, 0.45);
            border-radius: 6px;
            box-shadow: inset 0 0 8px rgba(255, 211, 91, 0.15), 0 4px 10px rgba(0,0,0,0.4);
            transform: translateZ(-30px) scale(0.9);
            animation: loopPanel 180s cubic-bezier(0.25, 1, 0.5, 1) infinite;
            animation-delay: 1s;
        }

        .marketing-text-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .text-slide {
            position: absolute;
            white-space: nowrap;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold-bright) 50%, var(--gold-main) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 3px rgba(0, 0, 0, 0.9));
            opacity: 0;
        }

        .slide-phone { animation: showPhone 180s ease-in-out infinite; }
        .slide-cta { animation: showCTA 180s ease-in-out infinite; }

        @keyframes showPhone {
            0%, 0.5% { opacity: 0; transform: translateY(5px); }
            0.6%, 2.7% { opacity: 1; transform: translateY(0); }
            2.8%, 100% { opacity: 0; transform: translateY(-5px); }
        }

        @keyframes showCTA {
            0%, 2.9% { opacity: 0; transform: translateY(5px); }
            3.0%, 5.4% { opacity: 1; transform: translateY(0); }
            5.5%, 100% { opacity: 0; transform: translateY(-5px); }
        }

        @keyframes loopPanel {
            0% { opacity: 0; transform: translateY(20px) translateZ(-30px) scale(0.9); }
            0.6%, 5.4% { opacity: 1; transform: translateY(0) translateZ(0) scale(1); }
            5.7%, 100% { opacity: 0; transform: translateY(10px) translateZ(50px); }
        }

        /* ==========================================
           4. DESTELLO MÁGICO "GLINT"
           ========================================== */
        .stage-3d::after {
            content: '';
            position: absolute;
            top: 15%;
            left: -150%;
            width: 90px;
            height: 60%;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 255, 255, 0.0) 20%, 
                rgba(255, 255, 255, 0.75) 50%, 
                rgba(255, 211, 91, 0.3) 70%, 
                transparent 100%
            );
            transform: skewX(-35deg) translateZ(20px);
            animation: loopFlash 180s ease-in-out infinite;
            animation-delay: 1.2s;
        }

        @keyframes loopFlash {
            0%, 1.0% { left: -150%; opacity: 0; }
            1.5% { left: 150%; opacity: 1; }
            2.0%, 100% { left: 150%; opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="stage-3d">
        
        <div class="wifi-3d-group">
            <div class="arc-3d arc-1"></div>
            <div class="arc-3d arc-2"></div>
            <div class="arc-3d arc-3"></div>
        </div>

        <div class="logo-core-3d">
            <span class="letter-3d m-piece" data-letter="M">M</span>
            <span class="letter-3d t-piece" data-letter="T">T</span>
            <span class="letter-3d g-piece" data-letter="G">G</span>
        </div>

        <div class="info-panel-3d">
            <div class="marketing-text-wrapper">
                <span class="text-slide slide-phone">TEL. 3684 7307</span>
                <span class="text-slide slide-cta">¡RESERVA YA!</span>
            </div>
        </div>
        
    </div>

</body>
</html>
