<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MTG - Infinite 3D Transformers Loop</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            perspective: 1200px;
            --gold-light: #FFD35B;
            --gold-main: #C99725;
            --gold-dark: #8C6211;
        }

        .stage-3d {
            position: relative;
            width: 600px;
            height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
        }

        /* ==========================================
           1. ISOTIPO: WI-FI CINEMÁTICO EN BUCLE
           ========================================== */
        .wifi-3d-group {
            position: relative;
            width: 200px;
            height: 110px;
            margin-bottom: 5px;
            transform-style: preserve-3d;
        }

        .arc-3d {
            position: absolute;
            bottom: 0;
            left: 50%;
            border: 14px solid transparent;
            border-top-color: var(--gold-main);
            border-radius: 50%;
            transform-style: preserve-3d;
            transform-origin: bottom center;
            opacity: 0;
            filter: drop-shadow(0px 5px 4px rgba(0,0,0,0.6)) drop-shadow(0px 0px 8px rgba(201,151,37,0.3));
        }

        /* Toda la coreografía dura 12 segundos e itera infinitamente */
        .arc-1 {
            width: 50px;
            height: 50px;
            margin-left: -39px;
            animation: loopArc1 12s cubic-bezier(0.19, 1, 0.22, 1) infinite;
        }

        .arc-2 {
            width: 110px;
            height: 110px;
            margin-left: -69px;
            animation: loopArc2 12s cubic-bezier(0.19, 1, 0.22, 1) infinite;
        }

        .arc-3 {
            width: 170px;
            height: 170px;
            margin-left: -99px;
            animation: loopArc3 12s cubic-bezier(0.19, 1, 0.22, 1) infinite;
        }

        /* Sincronización de tiempos (0% al 10% entra, 10% al 80% estático, 80% al 90% sale, 90% al 100% oculto) */
        @keyframes loopArc1 {
            0% { opacity: 0; transform: translateZ(400px) translateY(-100px) rotateX(-90deg) scale(0.1); filter: brightness(3); }
            8% { opacity: 1; transform: translateZ(0) translateY(0) rotateX(0deg) scale(1); filter: brightness(1); }
            80% { opacity: 1; transform: translateZ(0) translateY(0) rotateX(0deg) scale(1); filter: brightness(1); }
            88% { opacity: 0; transform: translateZ(400px) translateY(-100px) rotateX(-90deg) scale(0.1); filter: brightness(2); }
            100% { opacity: 0; }
        }
        @keyframes loopArc2 {
            0%, 2% { opacity: 0; transform: translateZ(500px) translateY(-150px) rotateY(90deg) scale(0.1); filter: brightness(3); }
            10% { opacity: 1; transform: translateZ(0) translateY(0) rotateY(0deg) scale(1); filter: brightness(1); }
            80% { opacity: 1; transform: translateZ(0) translateY(0) rotateY(0deg) scale(1); filter: brightness(1); }
            88% { opacity: 0; transform: translateZ(500px) translateY(-150px) rotateY(90deg) scale(0.1); filter: brightness(2); }
            100% { opacity: 0; }
        }
        @keyframes loopArc3 {
            0%, 4% { opacity: 0; transform: translateZ(600px) translateY(-200px) rotateX(90deg) scale(0.1); filter: brightness(3); }
            12% { opacity: 1; transform: translateZ(0) translateY(0) rotateX(0deg) scale(1); filter: brightness(1); }
            80% { opacity: 1; transform: translateZ(0) translateY(0) rotateX(0deg) scale(1); filter: brightness(1); }
            88% { opacity: 0; transform: translateZ(600px) translateY(-200px) rotateX(90deg) scale(0.1); filter: brightness(2); }
            100% { opacity: 0; }
        }

        /* ==========================================
           2. NÚCLEO MECÁNICO: LETRAS MTG EN BUCLE 3D
           ========================================== */
        .logo-core-3d {
            display: flex;
            transform-style: preserve-3d;
            font-family: 'Orbitron', sans-serif;
            font-size: 130px;
            font-weight: 900;
            letter-spacing: -4px;
            position: relative;
        }

        .letter-3d {
            display: inline-block;
            position: relative;
            transform-style: preserve-3d;
            opacity: 0;
            background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold-main) 50%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .letter-3d::after {
            content: attr(data-letter);
            position: absolute;
            top: 0;
            left: 0;
            transform: translateZ(-10px);
            background: linear-gradient(180deg, #5c4103 0%, #2b1f01 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: -1;
        }

        .m-piece { animation: loopM3D 12s cubic-bezier(0.075, 0.82, 0.165, 1) infinite; }
        .t-piece { animation: loopT3D 12s cubic-bezier(0.165, 0.84, 0.44, 1) infinite; }
        .g-piece { animation: loopG3D 12s cubic-bezier(0.075, 0.82, 0.165, 1) infinite; }

        @keyframes loopM3D {
            0%, 5% { opacity: 0; transform: translateX(-500px) translateY(200px) translateZ(600px) rotateY(-130deg) rotateX(45deg); filter: blur(8px) brightness(3); }
            15% { opacity: 1; transform: translateX(0) translateY(0) translateZ(0) rotateY(0deg) rotateX(0deg); filter: blur(0px) brightness(1); }
            80% { opacity: 1; transform: translateX(0) translateY(0) translateZ(0) rotateY(0deg) rotateX(0deg); filter: blur(0px) brightness(1); }
            86% { opacity: 0; transform: translateX(-500px) translateY(200px) translateZ(600px) rotateY(-130deg) rotateX(45deg); filter: blur(4px) brightness(2); }
            100% { opacity: 0; }
        }

        @keyframes loopT3D {
            0%, 8% { opacity: 0; transform: translateY(-400px) translateZ(-800px) rotateX(-90deg) scale(0.4); filter: brightness(4); }
            18% { opacity: 1; transform: translateY(0) translateZ(0) rotateX(0deg) scale(1); filter: brightness(1); }
            80% { opacity: 1; transform: translateY(0) translateZ(0) rotateX(0deg) scale(1); filter: brightness(1); }
            86% { opacity: 0; transform: translateY(-400px) translateZ(-800px) rotateX(-90deg) scale(0.4); filter: brightness(2); }
            100% { opacity: 0; }
        }

        @keyframes loopG3D {
            0%, 6% { opacity: 0; transform: translateX(500px) translateY(-150px) translateZ(600px) rotateY(140deg) rotateX(-30deg); filter: blur(8px) brightness(3); }
            16% { opacity: 1; transform: translateX(0) translateY(0) translateZ(0) rotateY(0deg) rotateX(0deg); filter: blur(0px) brightness(1); }
            80% { opacity: 1; transform: translateX(0) translateY(0) translateZ(0) rotateY(0deg) rotateX(0deg); filter: blur(0px) brightness(1); }
            86% { opacity: 0; transform: translateX(500px) translateY(-150px) translateZ(600px) rotateY(140deg) rotateX(-30deg); filter: blur(4px) brightness(2); }
            100% { opacity: 0; }
        }

        /* ==========================================
           3. BASE DE DATOS: PANEL INFORMATIVO
           ========================================== */
        .info-panel-3d {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            color: #ffffff;
            margin-top: 20px;
            letter-spacing: 4px;
            font-weight: 900;
            opacity: 0;
            border: 2px solid var(--gold-main);
            background: rgba(18, 18, 18, 0.85);
            padding: 8px 30px;
            border-radius: 6px;
            box-shadow: 0 0 15px rgba(201, 151, 37, 0.4);
            transform: translateZ(-100px) scaleX(0);
            animation: loopPanel 12s cubic-bezier(0.175, 0.885, 0.32, 1.275) infinite;
        }

        @keyframes loopPanel {
            0%, 18% { opacity: 0; transform: translateZ(-100px) scaleX(0); filter: brightness(3); }
            24% { opacity: 1; transform: translateZ(0) scaleX(1); filter: brightness(1); }
            80% { opacity: 1; transform: translateZ(0) scaleX(1); filter: brightness(1); }
            85% { opacity: 0; transform: translateZ(-100px) scaleX(0); filter: brightness(2); }
            100% { opacity: 0; }
        }

        /* ==========================================
           4. DESTELLO CINEMATOGRÁFICO DE CIERRE (SHINE)
           ========================================== */
        .stage-3d::after {
            content: '';
            position: absolute;
            top: 15%;
            left: -150%;
            width: 60px;
            height: 70%;
            background: linear-gradient(90deg, transparent, rgba(255, 211, 91, 0.6), transparent);
            transform: skewX(-25deg) translateZ(20px);
            animation: loopFlash 12s ease-in-out infinite;
        }

        @keyframes loopFlash {
            0%, 23% { left: -150%; opacity: 0; }
            30% { left: 150%; opacity: 1; }
            35%, 100% { left: 150%; opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="stage-3d">
        
        <div class="wifi-3d-group">
            <div class="arc-3d arc-1"></div>
            <div class="arc-3d arc-2"></div>
            <div class="arc-3d arc-3"></div>
        </div>

        <div class="logo-core-3d">
            <span class="letter-3d m-piece" data-letter="M">M</span>
            <span class="letter-3d t-piece" data-letter="T">T</span>
            <span class="letter-3d g-piece" data-letter="G">G</span>
        </div>

        <div class="info-panel-3d">TEL. 3684 7307</div>
        
    </div>

</body>
</html>
