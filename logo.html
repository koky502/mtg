<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MTG - Marketing Master Overlay 3D Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght=900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            perspective: 1600px;
            --gold-light: #FFF5BC;
            --gold-bright: #FFD35B;
            --gold-main: #C99725;
            --gold-dark: #8C6211;
            --gold-deep: #3A2803;
        }

        /* CONTENEDOR PRINCIPAL CONTROLADO POR JS */
        .stage-3d {
            position: relative;
            width: 700px;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            filter: drop-shadow(0px 8px 16px rgba(0,0,0,0.65));
            
            /* Estado inicial: oculto fuera de escena */
            opacity: 0;
            transform: scale(0.8) translateZ(-200px);
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Clases de activación controladas por el temporizador */
        .stage-3d.activo {
            opacity: 1;
            transform: scale(1) translateZ(0px);
        }

        /* ==========================================
           1. ARCOS WI-FI (SEÑAL ACTIVA EN ENTRADA)
           ========================================== */
        .wifi-3d-group {
            position: relative;
            width: 240px;
            height: 65px;
            margin-bottom: -23px; 
            transform-style: preserve-3d;
            z-index: 10;
        }

        .arc-3d {
            position: absolute;
            bottom: 0;
            left: 50%;
            border: 14px solid transparent;
            border-top: 14px solid var(--gold-bright);
            border-radius: 50%;
            transform-style: preserve-3d;
            transform-origin: bottom center;
            opacity: 0;
        }

        .arc-1 { width: 60px; height: 60px; margin-left: -44px; }
        .arc-2 { width: 120px; height: 120px; margin-left: -74px; }
        .arc-3 { width: 180px; height: 180px; margin-left: -104px; }

        /* Animación de disparo único al activarse */
        .activo .arc-1 { animation: entradaArc 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; animation-delay: 0.1s; }
        .activo .arc-2 { animation: entradaArc 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; animation-delay: 0.3s; }
        .activo .arc-3 { animation: entradaArc 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; animation-delay: 0.5s; }

        @keyframes entradaArc {
            0% { opacity: 0; transform: translateZ(200px) scale(0.4); filter: brightness(2.5) drop-shadow(0 0 15px var(--gold-bright)); }
            30% { opacity: 1; transform: translateZ(0) scale(1); filter: brightness(1.8) drop-shadow(0 0 12px var(--gold-bright)); }
            100% { opacity: 1; transform: translateZ(0) scale(1); filter: brightness(1) drop-shadow(0px 4px 8px rgba(0,0,0,0.7)); }
        }

        /* ==========================================
           2. NÚCLEO: LETRAS MTG
           ========================================== */
        .logo-core-3d {
            display: flex;
            transform-style: preserve-3d;
            font-family: 'Orbitron', sans-serif;
            font-size: 140px;
            font-weight: 900;
            letter-spacing: -2px;
            position: relative;
            color: var(--gold-bright);
            line-height: 110px;
        }

        .letter-3d {
            display: inline-block;
            position: relative;
            transform-style: preserve-3d;
            opacity: 0;
            background: linear-gradient(135deg, 
                var(--gold-light) 0%, 
                var(--gold-bright) 28%, 
                var(--gold-dark) 55%, 
                var(--gold-light) 78%, 
                var(--gold-main) 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .letter-3d::after {
            content: attr(data-letter);
            position: absolute;
            top: 0;
            left: 0;
            transform: translateZ(-14px);
            background: linear-gradient(180deg, var(--gold-main) 0%, var(--gold-deep) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: -1;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.8));
        }

        /* Animaciones rítmicas de entrada única */
        .activo .m-piece { animation: entradaLetraM 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; animation-delay: 0.2s; }
        .activo .t-piece { animation: entradaLetraT 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; animation-delay: 0.4s; }
        .activo .g-piece { animation: entradaLetraG 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; animation-delay: 0.6s; }

        @keyframes entradaLetraM {
            0% { opacity: 0; transform: translateX(-80px) translateZ(150px) rotateY(-40deg); filter: brightness(2); }
            40% { opacity: 1; transform: translateX(0) translateZ(0) rotateY(0deg); filter: brightness(1.8) drop-shadow(0 0 25px rgba(255, 211, 91, 0.6)); }
            100% { opacity: 1; transform: translateX(0) translateZ(0) rotateY(0deg); filter: brightness(1); }
        }

        @keyframes entradaLetraT {
            0% { opacity: 0; transform: translateY(-50px) translateZ(150px) rotateX(40deg); filter: brightness(2); }
            40% { opacity: 1; transform: translateY(0) translateZ(0) rotateX(0deg); filter: brightness(1.8) drop-shadow(0 0 25px rgba(255, 211, 91, 0.6)); }
            100% { opacity: 1; transform: translateY(0) translateZ(0) rotateX(0deg); filter: brightness(1); }
        }

        @keyframes entradaLetraG {
            0% { opacity: 0; transform: translateX(80px) translateZ(150px) rotateY(40deg); filter: brightness(2); }
            40% { opacity: 1; transform: translateX(0) translateZ(0) rotateY(0deg); filter: brightness(1.8) drop-shadow(0 0 25px rgba(255, 211, 91, 0.6)); }
            100% { opacity: 1; transform: translateX(0) translateZ(0) rotateY(0deg); filter: brightness(1); }
        }

        /* ==========================================
           3. PANEL DE MARKETING CON MÁRGENES CORREGIDOS
           ========================================== */
        .info-panel-3d {
            position: relative;
            min-width: 320px; 
            padding: 0 25px; /* Corrección de las flechas rojas: margen interno seguro */
            height: 48px;
            margin-top: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 2.5px;
            opacity: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 10, 0.78); /* Mayor solidez sobre fondos complejos */
            border-radius: 6px;
            border: 1.5px solid rgba(255, 211, 91, 0.3);
            box-shadow: inset 0 0 12px rgba(255, 211, 91, 0.15), 0 6px 15px rgba(0,0,0,0.5);
            transform: translateZ(-30px) scale(0.9);
        }

        .activo .info-panel-3d {
            animation: entradaPanel 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 0.8s;
        }

        @keyframes entradaPanel {
            0% { opacity: 0; transform: translateY(20px) translateZ(-30px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) translateZ(0) scale(1); }
        }

        .marketing-text-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .text-slide {
            position: absolute;
            white-space: nowrap;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold-bright) 50%, var(--gold-main) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.9));
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease-in-out;
        }

        /* Control de slides internos por clases JS */
        .text-slide.activo-slide {
            opacity: 1;
            transform: translateY(0);
        }
        
        .text-slide.pasado-slide {
            opacity: 0;
            transform: translateY(-10px);
        }

        /* ==========================================
           4. DESTELLO PREMIUM "GLINT"
           ========================================== */
        .stage-3d::after {
            content: '';
            position: absolute;
            top: 15%;
            left: -150%;
            width: 110px;
            height: 60%;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 255, 255, 0.8) 50%, 
                rgba(255, 211, 91, 0.4) 75%, 
                transparent 100%
            );
            transform: skewX(-30deg) translateZ(30px);
            opacity: 0;
        }

        .activo::after {
            animation: destelloGlint 2s ease-in-out forwards;
            animation-delay: 1.5s;
        }

        @annotation destelloGlint {
            0% { left: -150%; opacity: 0; }
            30% { opacity: 1; }
            70% { opacity: 1; }
            100% { left: 150%; opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="mtg-stage" class="stage-3d">
        
        <div class="wifi-3d-group">
            <div class="arc-3d arc-1"></div>
            <div class="arc-3d arc-2"></div>
            <div class="arc-3d arc-3"></div>
        </div>

        <div class="logo-core-3d">
            <span class="letter-3d m-piece" data-letter="M">M</span>
            <span class="letter-3d t-piece" data-letter="T">T</span>
            <span class="letter-3d g-piece" data-letter="G">G</span>
        </div>

        <div class="info-panel-3d">
            <div class="marketing-text-wrapper">
                <span id="slide-1" class="text-slide">TEL. 3684 7307</span>
                <span id="slide-2" class="text-slide">¡RESERVA YA!</span>
            </div>
        </div>
        
    </div>

    <script>
        // CONFIGURACIÓN ESTRICTA DE TIEMPOS (En milisegundos)
        const DURACION_VISIBLE = 12000; // 12 segundos expuesto en pantalla
        const PAUSA_OCULTO     = 180000; // 3 minutos oculto (180 segundos exactos)

        const stage = document.getElementById("mtg-stage");
        const slide1 = document.getElementById("slide-1");
        const slide2 = document.getElementById("slide-2");

        function ejecutarBucleLogo() {
            // 1. Entrada del contenedor principal
            stage.className = "stage-3d activo";
            
            // 2. Control de los textos deslizantes internos
            // Primer texto (Teléfono) aparece inmediatamente
            slide1.className = "text-slide activo-slide";
            slide2.className = "text-slide";

            // A los 6 segundos cambia al segundo texto (CTA / ¡RESERVA YA!)
            setTimeout(() => {
                slide1.className = "text-slide pasado-slide";
                slide2.className = "text-slide activo-slide";
            }, 6000);

            // 3. Desaparición completa de la escena a los 12 segundos exactos
            setTimeout(() => {
                stage.className = "stage-3d"; // Quita la clase 'activo' y se oculta con transición suave
                
                // Limpieza de estados internos para la próxima vuelta
                setTimeout(() => {
                    slide1.className = "text-slide";
                    slide2.className = "text-slide";
                }, 1000);

            }, DURACION_VISIBLE);
        }

        function iniciarControlador() {
            // Primera ejecución al cargar la página
            ejecutarBucleLogo();

            // Configuración del intervalo matemático continuo (Tiempo visible + tiempo de espera)
            setInterval(ejecutarBucleLogo, DURACION_VISIBLE + PAUSA_OCULTO);
        }

        // Arranca el sistema cuando el documento esté completamente listo
        window.onload = iniciarControlador;
    </script>
</body>
</html>
