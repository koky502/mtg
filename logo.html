<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MTG - Ultra Compact Perfect Fit 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            perspective: 1400px;
            --gold-light: #FFF099;
            --gold-bright: #FFD35B;
            --gold-main: #C99725;
            --gold-dark: #8C6211;
            --gold-deep: #4A3406;
        }

        .stage-3d {
            position: relative;
            width: 700px;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
        }

        /* ==========================================
           1. ARCOS WI-FI (PEGADOS A LAS LETRAS)
           ========================================== */
        .wifi-3d-group {
            position: relative;
            width: 240px;
            height: 65px;
            margin-bottom: -25px; /* Margen negativo para eliminar el espacio de las flechas rojas */
            transform-style: preserve-3d;
            z-index: 10;
        }

        .arc-3d {
            position: absolute;
            bottom: 0;
            left: 50%;
            border: 14px solid transparent;
            border-top: 14px solid var(--gold-bright);
            border-radius: 50%;
            transform-style: preserve-3d;
            transform-origin: bottom center;
            opacity: 0;
            filter: drop-shadow(0px 4px 6px rgba(74, 52, 6, 0.8)) drop-shadow(0px 0px 12px var(--gold-bright));
        }

        .arc-1 { width: 60px; height: 60px; margin-left: -44px; animation: loopArc1 12s cubic-bezier(0.19, 1, 0.22, 1) infinite; }
        .arc-2 { width: 120px; height: 120px; margin-left: -74px; animation: loopArc2 12s cubic-bezier(0.19, 1, 0.22, 1) infinite; }
        .arc-3 { width: 180px; height: 180px; margin-left: -104px; animation: loopArc3 12s cubic-bezier(0.19, 1, 0.22, 1) infinite; }

        @keyframes loopArc1 {
            0% { opacity: 0; transform: translateZ(500px) translateY(-100px) rotateX(-90deg) scale(0.1); filter: brightness(3); }
            8% { opacity: 1; transform: translateZ(0) translateY(0) rotateX(0deg) scale(1); filter: brightness(1); }
            80% { opacity: 1; transform: translateZ(0) translateY(0) rotateX(0deg) scale(1); filter: brightness(1); }
            88% { opacity: 0; transform: translateZ(500px) translateY(-100px) rotateX(-90deg) scale(0.1); }
            100% { opacity: 0; }
        }
        @keyframes loopArc2 {
            0%, 2% { opacity: 0; transform: translateZ(600px) translateY(-150px) rotateY(90deg) scale(0.1); filter: brightness(3); }
            10% { opacity: 1; transform: translateZ(0) translateY(0) rotateY(0deg) scale(1); filter: brightness(1); }
            80% { opacity: 1; transform: translateZ(0) translateY(0) rotateY(0deg) scale(1); filter: brightness(1); }
            88% { opacity: 0; transform: translateZ(600px) translateY(-150px) rotateY(90deg) scale(0.1); }
            100% { opacity: 0; }
        }
        @keyframes loopArc3 {
            0%, 4% { opacity: 0; transform: translateZ(700px) translateY(-200px) rotateX(90deg) scale(0.1); filter: brightness(3); }
            12% { opacity: 1; transform: translateZ(0) translateY(0) rotateX(0deg) scale(1); filter: brightness(1); }
            80% { opacity: 1; transform: translateZ(0) translateY(0) rotateX(0deg) scale(1); filter: brightness(1); }
            88% { opacity: 0; transform: translateZ(700px) translateY(-200px) rotateX(90deg) scale(0.1); }
            100% { opacity: 0; }
        }

        /* ==========================================
           2. NÚCLEO: LETRAS MTG
           ========================================== */
        .logo-core-3d {
            display: flex;
            transform-style: preserve-3d;
            font-family: 'Orbitron', sans-serif;
            font-size: 140px;
            font-weight: 900;
            letter-spacing: -2px;
            position: relative;
            color: var(--gold-bright);
            line-height: 110px;
        }

        .letter-3d {
            display: inline-block;
            position: relative;
            transform-style: preserve-3d;
            opacity: 0;
            background: linear-gradient(135deg, 
                var(--gold-light) 0%, 
                var(--gold-bright) 25%, 
                var(--gold-dark) 50%, 
                var(--gold-light) 75%, 
                var(--gold-main) 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 8px 10px rgba(74, 52, 6, 0.7));
        }

        .letter-3d::after {
            content: attr(data-letter);
            position: absolute;
            top: 0;
            left: 0;
            transform: translateZ(-12px);
            background: linear-gradient(180deg, var(--gold-main) 0%, var(--gold-deep) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: -1;
        }

        .m-piece { animation: loopM3D 12s cubic-bezier(0.075, 0.82, 0.165, 1) infinite; }
        .t-piece { animation: loopT3D 12s cubic-bezier(0.165, 0.84, 0.44, 1) infinite; }
        .g-piece { animation: loopG3D 12s cubic-bezier(0.075, 0.82, 0.165, 1) infinite; }

        @keyframes loopM3D {
            0%, 5% { opacity: 0; transform: translateX(-550px) translateY(150px) translateZ(500px) rotateY(-110deg) rotateX(35deg); filter: blur(6px) brightness(2.5); }
            15% { opacity: 1; transform: translateX(0) translateY(0) translateZ(0) rotateY(0deg) rotateX(0deg); filter: blur(0px) brightness(1); }
            80% { opacity: 1; transform: translateX(0) translateY(0) translateZ(0) rotateY(0deg) rotateX(0deg); filter: blur(0px) brightness(1); }
            86% { opacity: 0; transform: translateX(-550px) translateY(150px) translateZ(500px) rotateY(-110deg) rotateX(35deg); }
            100% { opacity: 0; }
        }

        @keyframes loopT3D {
            0%, 8% { opacity: 0; transform: translateY(-350px) translateZ(-600px) rotateX(-75deg) scale(0.5); filter: brightness(3); }
            18% { opacity: 1; transform: translateY(0) translateZ(0) rotateX(0deg) scale(1); filter: brightness(1); }
            80% { opacity: 1; transform: translateY(0) translateZ(0) rotateX(0deg) scale(1); filter: brightness(1); }
            86% { opacity: 0; transform: translateY(-350px) translateZ(-600px) rotateX(-75deg) scale(0.4); }
            100% { opacity: 0; }
        }

        @keyframes loopG3D {
            0%, 6% { opacity: 0; transform: translateX(550px) translateY(-100px) translateZ(500px) rotateY(120deg) rotateX(-25deg); filter: blur(6px) brightness(2.5); }
            16% { opacity: 1; transform: translateX(0) translateY(0) translateZ(0) rotateY(0deg) rotateX(0deg); filter: blur(0px) brightness(1); }
            80% { opacity: 1; transform: translateX(0) translateY(0) translateZ(0) rotateY(0deg) rotateX(0deg); filter: blur(0px) brightness(1); }
            86% { opacity: 0; transform: translateX(550px) translateY(-100px) translateZ(500px) rotateY(120deg) rotateX(-25deg); }
            100% { opacity: 0; }
        }

        /* ==========================================
           3. PANEL DE DATOS
           ========================================== */
        .info-panel-3d {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            color: #ffffff;
            margin-top: -5px; 
            letter-spacing: 5px;
            font-weight: 900;
            opacity: 0;
            border: none;
            background: rgba(18, 18, 18, 0.4);
            padding: 8px 40px;
            border-radius: 8px;
            text-shadow: 0 0 10px var(--gold-bright);
            box-shadow: inset 0 0 10px rgba(201, 151, 37, 0.2);
            transform: translateZ(-50px) scaleX(0);
            animation: loopPanel 12s cubic-bezier(0.175, 0.885, 0.32, 1.275) infinite;
        }

        @keyframes loopPanel {
            0%, 18% { opacity: 0; transform: translateZ(-50px) scaleX(0); }
            24% { opacity: 1; transform: translateZ(0) scaleX(1); }
            80% { opacity: 1; transform: translateZ(0) scaleX(1); }
            85% { opacity: 0; transform: translateZ(-50px) scaleX(0); }
            100% { opacity: 0; }
        }

        /* ==========================================
           4. DESTELLO MÁGICO
           ========================================== */
        .stage-3d::after {
            content: '';
            position: absolute;
            top: 25%;
            left: -150%;
            width: 80px;
            height: 50%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), rgba(255, 211, 91, 0.5), transparent);
            transform: skewX(-30deg) translateZ(30px);
            animation: loopFlash 12s ease-in-out infinite;
        }

        @keyframes loopFlash {
            0%, 24% { left: -150%; opacity: 0; }
            32% { left: 150%; opacity: 1; }
            38%, 100% { left: 150%; opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="stage-3d">
        
        <div class="wifi-3d-group">
            <div class="arc-3d arc-1"></div>
            <div class="arc-3d arc-2"></div>
            <div class="arc-3d arc-3"></div>
        </div>

        <div class="logo-core-3d">
            <span class="letter-3d m-piece" data-letter="M">M</span>
            <span class="letter-3d t-piece" data-letter="T">T</span>
            <span class="letter-3d g-piece" data-letter="G">G</span>
        </div>

        <div class="info-panel-3d">TEL. 3684 7307</div>
        
    </div>

</body>
</html>
