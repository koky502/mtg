<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MTG - Cinematic 3D Transformers</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            /* Activamos el espacio tridimensional global */
            perspective: 1200px;
            --gold-light: #FFD35B;
            --gold-main: #C99725;
            --gold-dark: #8C6211;
        }

        /* Contenedor Maestro con soporte 3D */
        .stage-3d {
            position: relative;
            width: 600px;
            height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
        }

        /* ==========================================
           1. ISOTIPO: WI-FI CINEMÁTICO DE ALTA RED
           ========================================== */
        .wifi-3d-group {
            position: relative;
            width: 200px;
            height: 110px;
            margin-bottom: 5px;
            transform-style: preserve-3d;
        }

        .arc-3d {
            position: absolute;
            bottom: 0;
            left: 50%;
            border: 14px solid transparent;
            border-top-color: var(--gold-main);
            border-radius: 50%;
            transform-style: preserve-3d;
            transform-origin: bottom center;
            opacity: 0;
            /* Simulación de bisel metálico mediante filtros de sombra avanzados */
            filter: drop-shadow(0px 5px 4px rgba(0,0,0,0.6)) drop-shadow(0px 0px 8px rgba(201,151,37,0.3));
        }

        .arc-1 {
            width: 50px;
            height: 50px;
            margin-left: -39px;
            animation: buildArc1 1.4s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            animation-delay: 0.2s;
        }

        .arc-2 {
            width: 110px;
            height: 110px;
            margin-left: -69px;
            animation: buildArc2 1.6s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            animation-delay: 0.4s;
        }

        .arc-3 {
            width: 170px;
            height: 170px;
            margin-left: -99px;
            animation: buildArc3 1.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            animation-delay: 0.6s;
        }

        @keyframes buildArc1 {
            0% { opacity: 0; transform: translateZ(400px) translateY(-100px) rotateX(-90deg) scale(0.1); filter: brightness(3); }
            100% { opacity: 1; transform: translateZ(0) translateY(0) rotateX(0deg) scale(1); filter: brightness(1); }
        }
        @keyframes buildArc2 {
            0% { opacity: 0; transform: translateZ(500px) translateY(-150px) rotateY(90deg) scale(0.1); filter: brightness(3); }
            100% { opacity: 1; transform: translateZ(0) translateY(0) rotateY(0deg) scale(1); filter: brightness(1); }
        }
        @keyframes buildArc3 {
            0% { opacity: 0; transform: translateZ(600px) translateY(-200px) rotateX(90deg) scale(0.1); filter: brightness(3); }
            100% { opacity: 1; transform: translateZ(0) translateY(0) rotateX(0deg) scale(1); filter: brightness(1); }
        }

        /* ==========================================
           2. NÚCLEO MECÁNICO: LETRAS MTG EN 3D
           ========================================== */
        .logo-core-3d {
            display: flex;
            transform-style: preserve-3d;
            font-family: 'Orbitron', sans-serif;
            font-size: 130px;
            font-weight: 900;
            letter-spacing: -4px;
            position: relative;
        }

        .letter-3d {
            display: inline-block;
            position: relative;
            transform-style: preserve-3d;
            opacity: 0;
            color: var(--gold-main);
            /* Gradiente metálico premium */
            background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold-main) 50%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Efecto de Extrusión 3D Real simulado mediante texto duplicado en capas de sombra */
        .letter-3d::after {
            content: attr(data-letter);
            position: absolute;
            top: 0;
            left: 0;
            transform: translateZ(-10px);
            background: linear-gradient(180deg, #5c4103 0%, #2b1f01 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: -1;
        }

        /* Animación Letra M - Viene cruzada en el eje Z rotando de forma agresiva */
        .m-piece {
            animation: transformM3D 1.6s cubic-bezier(0.075, 0.82, 0.165, 1) forwards;
            animation-delay: 0.8s;
        }
        @keyframes transformM3D {
            0% {
                opacity: 0;
                transform: translateX(-500px) translateY(200px) translateZ(600px) rotateY(-130deg) rotateX(45deg);
                filter: blur(8px) brightness(3);
            }
            80% {
                opacity: 1;
                transform: translateX(10px) translateY(-5px) translateZ(-20px) rotateY(15deg) rotateX(-5deg);
                filter: blur(0px);
            }
            100% {
                opacity: 1;
                transform: translateX(0) translateY(0) translateZ(0) rotateY(0deg) rotateX(0deg);
            }
        }

        /* Animación Letra T - La pieza central que cae perpendicular impactando el lienzo */
        .t-piece {
            animation: transformT3D 1.4s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
            animation-delay: 1.1s;
            z-index: 5;
        }
        @keyframes transformT3D {
            0% {
                opacity: 0;
                transform: translateY(-400px) translateZ(-800px) rotateX(-90deg) scale(0.4);
                filter: brightness(4);
            }
            70% {
                opacity: 1;
                transform: translateY(15px) translateZ(30px) rotateX(10deg) scale(1.05);
            }
            100% {
                opacity: 1;
                transform: translateY(0) translateZ(0) rotateX(0deg) scale(1);
                filter: brightness(1);
            }
        }

        /* Animación Letra G - Entra desde el fondo del espacio tridimensional rotando veloz */
        .g-piece {
            animation: transformG3D 1.6s cubic-bezier(0.075, 0.82, 0.165, 1) forwards;
            animation-delay: 0.9s;
        }
        @keyframes transformG3D {
            0% {
                opacity: 0;
                transform: translateX(500px) translateY(-150px) translateZ(600px) rotateY(140deg) rotateX(-30deg);
                filter: blur(8px) brightness(3);
            }
            80% {
                opacity: 1;
                transform: translateX(-10px) translateY(5px) translateZ(-20px) rotateY(-15deg) rotateX(5deg);
                filter: blur(0px);
            }
            100% {
                opacity: 1;
                transform: translateX(0) translateY(0) translateZ(0) rotateY(0deg) rotateX(0deg);
            }
        }

        /* ==========================================
           3. BASE DE DATOS: ESCÁNER MECÁNICO
           ========================================== */
        .info-panel-3d {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            color: #ffffff;
            margin-top: 20px;
            letter-spacing: 4px;
            font-weight: 900;
            opacity: 0;
            border: 2px solid var(--gold-main);
            background: rgba(18, 18, 18, 0.85);
            padding: 8px 30px;
            border-radius: 6px;
            box-shadow: 0 0 15px rgba(201, 151, 37, 0.4);
            transform: translateZ(-100px) scaleX(0);
            animation: lockPanel3D 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 2.3s;
        }

        @keyframes lockPanel3D {
            0% {
                opacity: 0;
                transform: translateZ(-100px) scaleX(0);
                filter: brightness(3);
            }
            100% {
                opacity: 1;
                transform: translateZ(0) scaleX(1);
                filter: brightness(1);
            }
        }

        /* ==========================================
           4. DESTELLO CINEMATOGRÁFICO DE CIERRE (SHINE)
           ========================================== */
        .shine-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            mix-blend-mode: overlay;
            pointer-events: none;
            transform-style: preserve-3d;
        }

        .stage-3d::after {
            content: '';
            position: absolute;
            top: 15%;
            left: -150%;
            width: 60px;
            height: 70%;
            background: linear-gradient(90deg, transparent, rgba(255, 211, 91, 0.6), transparent);
            transform: skewX(-25deg) translateZ(20px);
            animation: cinematicFlash 1.4s ease-in-out forwards;
            animation-delay: 2.6s;
        }

        @keyframes cinematicFlash {
            0% { left: -150%; opacity: 1; }
            100% { left: 150%; opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Escenario de Renderizado 3D Completo -->
    <div class="stage-3d">
        
        <!-- Isotipo Desfragmentado en el Espacio Z -->
        <div class="wifi-3d-group">
            <div class="arc-3d arc-1"></div>
            <div class="arc-3d arc-2"></div>
            <div class="arc-3d arc-3"></div>
        </div>

        <!-- El Núcleo de Letras Extruidas Mecánicas -->
        <div class="logo-core-3d">
            <span class="letter-3d m-piece" data-letter="M">M</span>
            <span class="letter-3d t-piece" data-letter="T">T</span>
            <span class="letter-3d g-piece" data-letter="G">G</span>
        </div>

        <!-- Panel de Confirmación de Datos del Negocio -->
        <div class="info-panel-3d">TEL. 3684 7307</div>
        
    </div>

</body>
</html>
