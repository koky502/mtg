<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reloj - MTG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        body { margin: 0; padding: 0; background: transparent; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        .time-box { background: linear-gradient(135deg, #111111 0%, #222222 100%); color: #e6ca65; height: 55px; width: 90px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; letter-spacing: 1px; border-bottom: 3px solid #e6ca65; clip-path: polygon(0% 0%, 100% 0%, 85% 100%, 15% 100%); cursor: pointer; }
    </style>
</head>
<body>
    <div id="game-clock" class="time-box" onclick="toggle()">00:00</div>
    <script>
        let segs = 0, activo = true;
        setInterval(() => {
            if (activo) {
                segs++;
                const m = Math.floor(segs / 60), s = segs % 60;
                document.getElementById("game-clock").innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
            }
        }, 1000);
        function toggle() {
            activo = !activo;
            document.getElementById("game-clock").style.color = activo ? "#e6ca65" : "#ff4444";
        }
    </script>
</body>
</html>
