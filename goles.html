<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Goles - MTG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap');
        body { margin: 0; padding: 0; background: transparent; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        #marcador-goles { display: flex; align-items: center; height: 55px; }
        .team-box { background: rgba(15, 15, 15, 0.95); color: #ffffff; height: 100%; display: flex; align-items: center; padding: 0 20px; font-size: 16px; font-weight: 800; text-transform: uppercase; min-width: 160px; border-bottom: 3px solid #b8860b; }
        .team-left { justify-content: flex-end; }
        .team-right { justify-content: flex-start; }
        .score-box { background: linear-gradient(135deg, #b8860b 0%, #e6ca65 50%, #996515 100%); color: #000000; height: 100%; width: 55px; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 900; z-index: 4; }
        .score-left { clip-path: polygon(0% 0%, 100% 0%, 80% 100%, 0% 100%); padding-right: 6px; }
        .score-right { clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 20% 100%); padding-left: 6px; }
        /* Espacio exacto para colocar el reloj en medio */
        .reloj-space { width: 90px; height: 100%; background: transparent; }
    </style>
</head>
<body>
    <div id="marcador-goles">
        <div id="team1-name" class="team-box team-left">LOCAL</div>
        <div id="team1-score" class="score-box score-left">0</div>
        <div class="reloj-space"></div>
        <div id="team2-score" class="score-box score-right">0</div>
        <div id="team2-name" class="team-box team-right">VISITANTE</div>
    </div>
    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTtxIX6cZO_YWTxd2X0ElxK59rl1lCE7bjLzlO21aBzoXZFrMC2Vd3Yin8AolkYFKK0zKPRhA7dF0Rn/pub?output=csv";
        function limpiar(t){ return t ? t.replace(/^"|"\$/g, '').trim() : ""; }
        async function actualizar() {
            try {
                const r = await fetch(`${csvUrl}&nocache=${new Date().getTime()}`);
                const d = await r.text(); const l = d.replace(/\r/g, "").split("\n");
                if (l.length < 9) return;
                const e1 = l[7].split(","); const e2 = l[8].split(",");
                document.getElementById("team1-name").innerText = limpiar(e1[0]);
                document.getElementById("team1-score").innerText = limpiar(e1[1]) || "0";
                document.getElementById("team2-name").innerText = limpiar(e1[0] ? e2[0] : "");
                document.getElementById("team2-score").innerText = limpiar(e2[1]) || "0";
            } catch (e) { console.error(e); }
        }
        setInterval(actualizar, 4000); actualizar();
    </script>
</body>
</html>
