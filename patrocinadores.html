<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticker de Patrocinadores - MTG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        #ticker-container {
    position: absolute;
    bottom: 30px;
    left: 5%;
    width: 90%;
    height: 50px;
    background: rgba(10, 10, 10, 0.93); /* Negro mate corporativo */
    border-bottom: 4px solid #d4af37; /* Línea inferior dorada */
    border-radius: 4px;
    display: flex;
    align-items: center;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
}

/* La pestaña de "Agradecemos a:" se viste con el degradado premium de MTG */
.ticker-label {
    background: linear-gradient(135deg, #b8860b 0%, #e6ca65 50%, #996515 100%);
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 25px;
    font-weight: 900;
    font-size: 13px;
    color: #000000; /* Texto negro para contraste limpio */
    text-transform: uppercase;
    letter-spacing: 1px;
    border-top-left-radius: 3px;
}

.ticker-content {
    flex-grow: 1;
    padding-left: 25px;
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #ffffff; /* Las marcas invitadas se leen nítidas en blanco */
}
    </style>
</head>
<body>

    <div id="ticker-container" class="animate__animated animate__fadeInUp">
        <div class="ticker-label">Agradecemos a:</div>
        <div id="ticker-text" class="ticker-content">Cargando patrocinadores...</div>
    </div>

   <script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTtxIX6cZO_YWTxd2X0ElxK59rl1lCE7bjLzlO21aBzoXZFrMC2Vd3Yin8AolkYFKK0zKPRhA7dF0Rn/pub?output=csv";
    
    let listaPatrocinadores = [];
    let indiceActual = 0;

    // Función de alta resistencia para extraer datos generales sin importar la posición de la columna
    function parseCSV(text) {
        // Normalizamos los saltos de línea para eliminar caracteres ocultos (\r)
        const lines = text.replace(/\r/g, "").split("\n");
        const result = [];
        
        if (lines.length === 0) return [];

        // Identificamos en qué columna quedó "datos_generales" limpiando espacios
        const headers = lines[0].split(",").map(h => h.trim().toLowerCase());
        const colIndex = headers.indexOf("datos_generales");

        // Si por alguna razón no encuentra la columna por nombre, usamos la última por defecto (Índice 4)
        const targetIndex = (colIndex !== -1) ? colIndex : 4;

        for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;

            // Expresión regular robusta para separar por comas respetando textos entre comillas
            const currentline = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            
            if (currentline[targetIndex]) {
                // Limpiamos comillas excedentes y espacios en blanco
                const valorLimpio = currentline[targetIndex].replace(/^"|"\$/g, '').trim();
                if (valorLimpio && valorLimpio !== "") {
                    result.push(valorLimpio);
                }
            }
        }
        return result;
    }

    // Carga los datos desde Google Sheets
    async function cargarPatrocinadores() {
        try {
            const response = await fetch(`${csvUrl}&nocache=${new Date().getTime()}`);
            const dataText = await response.text();
            
            const nuevasMarcas = parseCSV(dataText);
            
            if (nuevasMarcas.length > 0) {
                listaPatrocinadores = nuevasMarcas;
            }
        } catch (error) {
            console.error("Error cargando marcas:", error);
        }
    }

    // Maneja la rotación visual con animaciones de entrada y salida
    function rotarTicker() {
        if (listaPatrocinadores.length === 0) return;

        const tickerText = document.getElementById("ticker-text");
        
        // Animación de salida
        tickerText.className = "ticker-content animate__animated animate__fadeOut";
        
        setTimeout(() => {
            // Aseguramos que el índice no quede fuera de rango si la lista cambia dinámicamente
            if (indiceActual >= listaPatrocinadores.length) {
                indiceActual = 0;
            }
            
            tickerText.innerText = listaPatrocinadores[indiceActual];
            indiceActual = (indiceActual + 1) % listaPatrocinadores.length;
            
            // Animación de entrada
            tickerText.className = "ticker-content animate__animated animate__fadeIn";
        }, 500);
    }

    // Inicialización de la cabecera
    async function iniciar() {
        await cargarPatrocinadores();
        
        // Si cargó datos, los muestra de inmediato
        if (listaPatrocinadores.length > 0) {
            rotarTicker();
        } else {
            document.getElementById("ticker-text").innerText = "Sincronizando con Ruta...";
        }
        
        // Cada 7 segundos cambia de marca en pantalla con animación
        setInterval(rotarTicker, 7000);
        
        // Cada 15 segundos actualiza la lista interna desde la nube
        setInterval(cargarPatrocinadores, 15000);
    }

    window.onload = iniciar;
</script>
</body>
</html>
