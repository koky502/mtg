<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Overlay de Koky502</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent; /* Totalmente transparente para OBS Studio */
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        /* El diseño de tu Banner */
        .banner-irl {
            position: absolute;
            bottom: 60px;
            left: 60px;
            background: rgba(15, 15, 15, 0.85); /* Fondo negro semitransparente profesional */
            border-left: 8px solid #00e5ff; /* Línea cian de acento */
            color: white;
            padding: 15px 35px;
            border-radius: 6px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
        }
        .titulo {
            font-size: 32px;
            font-weight: bold;
            margin: 0;
        }
        .subtitulo {
            font-size: 20px;
            color: #d1d1d1;
            margin: 6px 0 0 0;
        }
    </style>
</head>
<body>

    <div class="banner-irl">
        <!-- ESTOS SON LOS TEXTOS QUE VAS A CAMBIAR DESDE EL TELÉFONO EN VIVO -->
        <p class="titulo">Transmisión en Vivo</p>
        <p class="subtitulo">Producción Profesional Independiente</p>
    </div>

</body>
</html>
