<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay Ciclismo MTG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        /* Estilos base optimizados para el croma o transparencia en OBS */
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: #ffffff;
        }

        /* Contenedor principal del Leaderboard (Tabla de posiciones) */
        #leaderboard {
            position: absolute;
            top: 40px;
            left: 40px;
            width: 380px;
            background: rgba(15, 23, 42, 0.85); /* Fondo oscuro semitransparente profesional */
            border-left: 6px solid #e11d48; /* Línea de acento color rojo deportivo */
            border-radius: 4px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        /* Encabezado del overlay */
        .header {
            background: #e11d48;
            padding: 10px 15px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }

        /* Filas de los ciclistas */
        .row {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .row:last-child {
            border-bottom: none;
        }

        /* Estilos de las celdas internas */
        .pos {
            width: 30px;
            font-weight: bold;
            color: #fbbf24; /* Color oro para el indicador visual */
            font-size: 16px;
        }

        .info {
            flex-grow: 1;
        }

        .name {
            font-weight: bold;
            font-size: 15px;
        }

        .team {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .time {
            font-weight: bold;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div id="leaderboard" class="animate__animated animate__fadeInLeft">
        <div class="header">
            <span>Posiciones en Vivo</span>
            <span id="general-info">--</span>
        </div>
        <div id="tabla-cuerpo">
            </div>
    </div>

    <script>
        // Endpoint en formato CSV que acabamos de validar
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTtxIX6cZO_YWTxd2X0ElxK59rl1lCE7bjLzlO21aBzoXZFrMC2Vd3Yin8AolkYFKK0zKPRhA7dF0Rn/pub?output=csv";

        // Función de ingeniería para convertir texto CSV plano en una matriz de objetos limpios
        function parseCSV(text) {
            const lines = text.split("\n");
            const headers = lines[0].split(",").map(h => h.trim().toLowerCase());
            const result = [];

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const currentline = lines[i].split(",");
                const obj = {};
                for (let j = 0; j < headers.length; j++) {
                    obj[headers[j]] = currentline[j] ? currentline[j].trim() : "";
                }
                result.push(obj);
            }
            return result;
        }

        // Función principal que hace el fetch asíncrono a la nube de Google
        async function actualizarOverlay() {
            try {
                // Forzamos la omisión de caché del navegador para asegurar tiempo real puro
                const response = await fetch(`${csvUrl}&nocache=${new Date().getTime()}`);
                const dataText = await response.text();
                const corredores = parseCSV(dataText);

                const tablaCuerpo = document.getElementById("tabla-cuerpo");
                let htmlContenido = "";

                // Iteramos los datos y construimos el diseño fila por fila
                corredores.forEach((corredor, index) => {
                    // Actualizamos el dato general (ej. Kilómetros restantes) usando la primera fila útil
                    if(index === 0 && corredor.datos_generales) {
                        document.getElementById("general-info").innerText = corredor.datos_generales;
                    }

                    // Validamos que la fila contenga un nombre real antes de dibujar
                    if(corredor.nombre) {
                        htmlContenido += `
                            <div class="row">
                                <div class="pos">${corredor.posicion || (index + 1)}</div>
                                <div class="info">
                                    <div class="name">${corredor.nombre}</div>
                                    <div class="team">${corredor.equipo || 'Individual'}</div>
                                </div>
                                <div class="time">${corredor.tiempo || '00:00'}</div>
                            </div>
                        `;
                    }
                });

                tablaCuerpo.innerHTML = htmlContenido;

            } catch (error) {
                console.error("Error de sincronización con la consola de control:", error);
            }
        }

        // Ejecución inmediata al cargar el overlay en OBS
        actualizarOverlay();

        // Bucle de telemetría: consulta a Google Sheets cada 3 segundos (3000 ms)
        setInterval(actualizarOverlay, 3000);
    </script>
</body>
</html>
